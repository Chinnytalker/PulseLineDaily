{% extends 'base.html' %}


{% block title %}Contact Us{% endblock %}
{% block content %}
<section class="max-w-7xl mx-auto px-4 py-12">
  <!-- Page Header -->
  <h1 class="text-3xl font-bold text-gray-800 mb-8 text-center md:text-left dark:bg-gray-900 dark:text-gray-300">Contact Information</h1>

  <div class="flex flex-col md:flex-row md:space-x-8 space-y-8 md:space-y-0">
    <!-- Contact Form -->
    <div class="flex-1 bg-gray-100 p-6 shadow rounded-lg">
      <form method="post" class="space-y-6">
        {% csrf_token %}
        <div>
          <label for="name" class="block text-sm font-medium text-gray-700 mb-1  dark:text-gray-300">Your Name</label>
          <input type="text" name="name" id="name" placeholder="Your Name"
                 class="w-full px-4 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" required>
        </div>
        <div>
          <label for="email" class="block text-sm font-medium text-gray-700 mb-1 dark:text-gray-300">Email Address</label>
          <input type="email" name="email" id="email" placeholder="name@example.com"
                 class="w-full px-4 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" required>
        </div>
        <div>
          <label for="message" class="block text-sm font-medium text-gray-700 mb-1 dark:text-gray-300">Message</label>
          <textarea name="message" id="message" placeholder="Leave a Message here"
                    class="w-full px-4 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
                    rows="6" required></textarea>
        </div>
        <div>
          <button type="submit"
                  class="bg-gray-700 text-white px-6 py-2 rounded-md hover:bg-blue-600 transition w-full md:w-auto">
            Send Message
          </button>
        </div>
      </form>
    </div>

    <!-- Contact Info + Map -->
    <div class="flex-1 flex flex-col space-y-6">
      <!-- Contact Info -->
      <div class="bg-gray-100 p-6 shadow rounded-lg space-y-4 ">
        <h2 class="text-xl font-semibold text-gray-800 ">Get in Touch</h2>
        <p><strong>Email:</strong> <a href="mailto:nwachukwuclinton2@gmail.com" class="text-blue-600 hover:underline">nwachukwuclinton2@gmail.com</a></p>
        <p><strong>Phone:</strong> <a href="tel:+2340000000000" class="text-blue-600 hover:underline">+234 9031928556</a></p>
        <p><strong>Address:</strong> Federal University Otuoke, Bayelsa State, Nigeria</p>

        <!-- Social Media Follow Buttons -->
        <div class="flex space-x-4 mt-4">
          <a href="https://www.facebook.com/share/1BQrg72dXv/?mibextid=wwXIfr" target="_blank" class="bg-blue-600 hover:bg-blue-700 text-white rounded-full w-10 h-10 flex items-center justify-center transition" aria-label="Facebook">
            <i class="fab fa-facebook-f"></i>
          </a>
          <a href="https://x.com/pulselinedaily?s=21&t=HdBK787O3UIzkseRnN2Tjw" target="_blank" class="bg-blue-400 hover:bg-blue-500 text-white rounded-full w-10 h-10 flex items-center justify-center transition" aria-label="Twitter">
            <i class="fab fa-x-twitter"></i>
          </a>
          <a href="https://www.instagram.com/pulselinedaily?igsh=YXR0cDhubm9veWgx&utm_source=qr" target="_blank" class="bg-pink-500 hover:bg-pink-600 text-white rounded-full w-10 h-10 flex items-center justify-center transition" aria-label="Instagram">
            <i class="fab fa-instagram"></i>
          </a>
          <a href="https://youtube.com/@pulselinedaily?si=17A-F-CiSZOXAV3nq" target="_blank" class="bg-red-600 hover:bg-red-700 text-white rounded-full w-10 h-10 flex items-center justify-center transition" aria-label="YouTube">
            <i class="fab fa-youtube"></i>
          </a>
        </div>
      </div>

      <!-- Google Map -->
      <div class="overflow-hidden rounded-lg shadow h-64 md:h-full">
        <iframe
          src="https://www.google.com/maps/embed?pb=!1m14!1m8!1m3!1d19791.332593575815!2d6.319031!3d4.792359!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x106aa2aee214a825%3A0x0!2sFederal%20University%20Otuoke!5e0!3m2!1sen!2sng!4v169∞∞∞∞∞"
          width="100%" height="100%" style="border:0;" allowfullscreen="" loading="lazy"
          referrerpolicy="no-referrer-when-downgrade"></iframe>
      </div>
    </div>
  </div>
</section>

{% endblock content %}
