services:
  web:
    build: .
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             gunicorn MaxDiscoverHub.wsgi:application --bind 0.0.0.0:2001 --workers 3 --timeout 120"
    restart: unless-stopped
    env_file:
      - ${APP_ENV_FILE:-.env}
    environment:
      DEBUG: "False"
      DJANGO_ENV: production
    depends_on:
      - redis
    expose:
      - "2001"
    volumes:
      - staticfiles:/app/staticfiles
      - media:/app/media

  celery:
    build: .
    command: celery -A MaxDiscoverHub worker -l info
    restart: unless-stopped
    env_file:
      - ${APP_ENV_FILE:-.env}
    environment:
      DEBUG: "False"
      DJANGO_ENV: production
    depends_on:
      - redis
    volumes:
      - media:/app/media

  celery-beat:
    build: .
    command: celery -A MaxDiscoverHub beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    restart: unless-stopped
    env_file:
      - ${APP_ENV_FILE:-.env}
    environment:
      DEBUG: "False"
      DJANGO_ENV: production
    depends_on:
      - redis

  redis:
    image: redis:7
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data

  nginx:
    image: nginx:latest
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - staticfiles:/app/staticfiles:ro
      - media:/app/media:ro
    depends_on:
      - web

volumes:
  staticfiles:
  media:
  redis_data: